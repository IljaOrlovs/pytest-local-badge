[tox]
envlist=lint,py310,py311,py312,py313,py314

[testenv]
skip_install = False
extras = develop
commands = pytest {posargs}

[testenv:lint]
skip_install = true
deps =
    black
    flake8
    flake8-import-order
    pep8-naming
    flake8-comprehensions
    flake8-bugbear
    flake8-print
commands =
    black --check src/ test/
    flake8 {posargs} src/ test/

[testenv:black]
skip_install = true
deps =
    black
commands = black setup.py setup.py src/ test/ {posargs}

[testenv:dev]
basepython = python3.10
usedevelop = True
extras = develop

[flake8]
max-line-length=120
import-order-style=edited
application-import-names=pytest_local_badge
; W503 -- line break before binary operator (black)
; E501 -- max line length (I defer to black)
extend-ignore=
    W503 E501
per-file-ignores =
    */__init__.py: N807, F401

[pytest]
minversion = 8.4
addopts = 
    --cov=pytest_local_badge --cov-report=term-missing --no-cov-on-fail 
    -v
    --local-badge-output-dir badges/

testpaths = test

## GitHub CI
[gh-actions]
python =
    3.10: py310,lint
    3.11: py311
    3.12: py312
    3.13: py313
    3.14: py314